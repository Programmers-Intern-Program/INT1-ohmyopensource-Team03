spring:
  config:
    activate:
      on-profile: dev
  ai:
    retry:
      max-attempts: 2 # 전체 1번 재시도 허용
    openai:
      api-key: ${GLM_API_KEY}
      base-url: https://aigw.alpha.grepp.co/v1
      chat:
        completions-path: /chat/completions
        options:
          model: glm-4.5
      embedding:
        enabled: false  # 임베딩은 Gemini가 담당

  # GitHub OAuth2 설정
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user

  # 데이터베이스 설정 (Docker Compose 호환)
  datasource:
    url: jdbc:postgresql://localhost:5432/oh_my_opensource?stringtype=unspecified
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

gemini:
  api-key: ${GEMINI_API_KEY}
  embedding:
    model: gemini-embedding-2

# GitHub API 설정
github:
  token: ${GITHUB_TOKEN}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24시간 (ms)

# OAuth2 로그인 성공 후 리다이렉트할 프론트엔드 URI
app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/callback}

# Langfuse 설정 (localhost:3001에서 프로젝트 생성 후 발급받은 키로 교체)
langfuse:
  host: ${LANGFUSE_HOST:http://localhost:3001}
  public-key: ${LANGFUSE_PUBLIC_KEY:}
  secret-key: ${LANGFUSE_SECRET_KEY:}

# 로깅 레벨
logging:
  level:
    root: INFO
    com.back.omos: DEBUG
    com.back.omos.global.ai.LangfuseClient: DEBUG # 프로젝트 패키지 로그 레벨