spring:
  config:
    activate:
      on-profile: prod
  ai:
    retry:
      max-attempts: 2
    openai:
      api-key: ${GLM_API_KEY}
      base-url: https://aigw.alpha.grepp.co/v1
      chat:
        completions-path: /chat/completions
        options:
          model: glm-4.5
      embedding:
        enabled: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user

  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME}?stringtype=unspecified
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

gemini:
  api-key: ${GEMINI_API_KEY}
  embedding:
    model: gemini-embedding-2

github:
  token: ${GITHUB_TOKEN}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI}

langfuse:
  host: ${LANGFUSE_HOST:http://localhost:3001}
  public-key: ${LANGFUSE_PUBLIC_KEY:}
  secret-key: ${LANGFUSE_SECRET_KEY:}

logging:
  level:
    root: INFO
    com.back.omos: INFO
