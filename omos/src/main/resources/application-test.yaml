spring:
  config:
    activate:
      on-profile: test

  # 테스트용 인메모리 DB (H2 사용 시)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # 테스트 시 실제 Redis 대신 Mock 등을 사용할 경우 설정
  data:
    redis:
      host: localhost
      port: 6379

github:
  token: ${GITHUB_TOKEN}

jwt:
  secret: test-secret-key-for-jwt-testing-only
  expiration: 86400000
